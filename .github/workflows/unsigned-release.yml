name: Unsigned Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to release, for example v3.12.3-fork. Leave empty on tag push."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: unsigned-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  signing-gate:
    runs-on: ubuntu-22.04
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Check signing secrets
        id: check
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ -n "${GITHUB_REF_NAME:-}" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "No tag provided" >&2
            exit 1
          fi

  build:
    if: ${{ needs.signing-gate.outputs.enabled == 'true' }}
    needs: signing-gate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact_name: unsigned-macos
          - os: ubuntu-22.04
            artifact_name: unsigned-linux
          - os: windows-2022
            artifact_name: unsigned-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.12.3
          run_install: false

      - name: Install Linux deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Checks
        shell: bash
        run: |
          pnpm exec tsc --noEmit
          pnpm exec vitest run tests/utils/providerConfigUtils.codex.test.ts tests/utils/providerConfigUtils.provider.test.ts
          cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build app
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          cargo build --release --manifest-path src-tauri/Cargo.toml

          if [ "$RUNNER_OS" = "macOS" ]; then
            pnpm tauri build --bundles app || true
            APP_PATH="src-tauri/target/release/bundle/macos/CC Switch.app"
            if [ -d "$APP_PATH" ]; then
              ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "release-assets/CC-Switch-${{ needs.signing-gate.outputs.tag }}-macOS-unsigned.zip"
            else
              tar -czf "release-assets/CC-Switch-${{ needs.signing-gate.outputs.tag }}-macOS-binary.tar.gz" -C src-tauri/target/release cc-switch
            fi
          elif [ "$RUNNER_OS" = "Linux" ]; then
            tar -czf "release-assets/CC-Switch-${{ needs.signing-gate.outputs.tag }}-linux-x86_64-unsigned.tar.gz" -C src-tauri/target/release cc-switch
          else
            powershell -NoProfile -Command "Compress-Archive -Path 'src-tauri/target/release/cc-switch.exe' -DestinationPath 'release-assets/CC-Switch-${{ needs.signing-gate.outputs.tag }}-windows-x86_64-unsigned.zip' -Force"
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    if: ${{ needs.signing-gate.outputs.enabled == 'true' }}
    runs-on: ubuntu-22.04
    needs:
      - signing-gate
      - build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: unsigned-*
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.signing-gate.outputs.tag }}
          name: CC Switch ${{ needs.signing-gate.outputs.tag }} (unsigned)
          prerelease: true
          body: |
            Unsigned fork build.

            These artifacts are meant for manual install only.
            Auto-update signing is intentionally skipped in this workflow.
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
